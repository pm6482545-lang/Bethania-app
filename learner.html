<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bethania Academy - Learner Verification Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans p-4 flex items-center justify-center">

    <div class="card w-full max-w-sm bg-white shadow-2xl border border-slate-200">
        <div class="card-body p-6">
            <div class="text-center mb-4">
                <span class="text-4xl">🎓</span>
                <h1 class="text-lg font-black text-slate-900 uppercase tracking-wider mt-2">Learner Access</h1>
                <p class="text-xs text-slate-500">Enter your unique Login ID to view profile.</p>
            </div>

            <div class="form-control w-full mb-4">
                <input type="text" id="login-input" placeholder="e.g. AB1234" class="input input-bordered w-full text-center font-mono uppercase font-bold" maxlength="6" />
            </div>

            <button id="verify-btn" class="btn btn-neutral w-full font-bold text-white shadow-lg">Verify Learner ID</button>

            <div id="result-box" class="mt-6 hidden p-4 bg-slate-50 rounded-xl border border-slate-200 text-center">
                <h2 id="res-name" class="font-bold text-slate-900"></h2>
                <p id="res-details" class="text-xs text-slate-600 mt-1 font-mono"></p>
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration[span_0](start_span)[span_0](end_span)
        const SUPABASE_URL = "https://avspdkeozxuxzbmegqwl.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_K9s_MVcCe1wtUNUO1YgRbA_QtoBZYRR";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginInput = document.getElementById('login-input');
        const verifyBtn = document.getElementById('verify-btn');
        const resultBox = document.getElementById('result-box');
        const resName = document.getElementById('res-name');
        const resDetails = document.getElementById('res-details');

        verifyBtn.addEventListener('click', async () => {
            const id = loginInput.value.trim().toUpperCase();
            if (!id) return alert("Please enter a valid Login ID.");

            verifyBtn.innerText = "Searching...";
            
            // Querying the students table for the specific login ID[span_1](start_span)[span_1](end_span)
            const { data, error } = await _supabase
                .from('students')
                .select('*')
                .eq('login_id', id)
                .single();

            verifyBtn.innerText = "Verify Learner ID";

            if (error || !data) {
                alert("Learner not found. Check the ID and try again.");
                resultBox.classList.add('hidden');
            } else {
                resName.innerText = data.name;
                resDetails.innerText = `Grade: ${data.grade} | Stream: ${data.stream}`;
                resultBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>

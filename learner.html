<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bethania Academy | CBA Learner Portal</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- jsPDF Library for Premium Document Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- DaisyUI and Tailwind CSS for Premium Styling -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 font-sans p-4 flex items-center justify-center">

    <!-- Premium CBA Workstation Container -->
    <div id="portal-app" class="card w-full max-w-lg bg-slate-800 shadow-2xl border border-slate-700/50 rounded-2xl">
        <div class="card-body p-6 sm:p-8">
            
            <!-- School Header with Live Logo Preview -->
            <div class="text-center mb-6">
                <div class="avatar mb-3">
                    <div class="w-20 rounded-full ring ring-amber-500 ring-offset-base-100 ring-offset-2 bg-white">
                        <img src="https://avspdkeozxuxzbmegqwl.supabase.co/storage/v1/object/public/Images/bethania.jpg" alt="Bethania Academy Logo" />
                    </div>
                </div>
                <h1 class="text-lg sm:text-xl font-black text-amber-400 tracking-wider uppercase">F.P.F.K Bethania Academy</h1>
                <p class="text-[9px] sm:text-[10px] text-slate-400 font-semibold tracking-widest uppercase">CBA Learner Verification Portal</p>
            </div>

            <div class="divider divider-warning opacity-30 my-2"></div>

            <!-- VIEW 1: SECURE LOGIN SCREEN -->
            <div id="login-section" class="space-y-4 py-2">
                <div class="text-center">
                    <h2 class="text-sm font-bold text-slate-300 uppercase tracking-tight">Access Assessment Records</h2>
                    <p class="text-xs text-slate-500 mt-1">Provide your unique Learner Login ID below.</p>
                </div>
                <div class="form-control w-full">
                    <input type="text" id="login-id" placeholder="e.g. AB1234" class="input input-bordered input-md bg-slate-900 border-slate-700 text-amber-300 w-full text-center font-mono uppercase font-bold tracking-widest" maxlength="6" />
                </div>
                <button id="btn-login" class="btn btn-warning hover:bg-amber-500 w-full font-bold text-slate-950 uppercase tracking-wide shadow-lg">
                    🔑 Verify & Enter Portal
                </button>
            </div>

            <!-- VIEW 2: PREMIUM RESULTS SCREEN -->
            <div id="result-section" class="hidden space-y-6">
                
                <!-- Student Meta-Info Badge -->
                <div id="student-info" class="text-xs space-y-1.5 bg-slate-900 border border-slate-700 p-4 rounded-xl font-mono text-slate-300 shadow-inner">
                    <!-- Dynamic details are rendered here -->
                </div>

                <!-- Live Ledger Table -->
                <div class="overflow-hidden rounded-xl border border-slate-700 bg-slate-900">
                    <table class="table table-xs w-full text-slate-300">
                        <thead class="bg-slate-950 text-amber-400 text-[10px] uppercase font-bold tracking-wider">
                            <tr>
                                <th class="p-3 text-left">Subject / Learning Area</th>
                                <th id="score-type-header" class="p-3 text-right">Score achieved</th>
                            </tr>
                        </thead>
                        <tbody id="marks-list" class="divide-y divide-slate-800 font-mono text-xs">
                            <!-- Dynamic rows are rendered here -->
                        </tbody>
                    </table>
                </div>

                <!-- Action Button Container -->
                <div class="flex gap-2.5">
                    <button id="btn-back" class="btn btn-outline btn-slate w-1/3 text-xs font-bold uppercase tracking-wider text-slate-400 border-slate-700 hover:bg-slate-700">
                        ↩️ Log Out
                    </button>
                    <button id="btn-download" class="btn btn-warning w-2/3 text-xs font-bold text-slate-950 uppercase tracking-wider shadow-lg">
                        📥 Save Result Slip (PDF)
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Supabase Setup
        const SUPABASE_URL = "https://avspdkeozxuxzbmegqwl.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_K9s_MVcCe1wtUNUO1YgRbA_QtoBZYRR";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const logoUrl = "https://avspdkeozxuxzbmegqwl.supabase.co/storage/v1/object/public/Images/bethania.jpg";
        let currentStudentData = null;
        let currentMarksData = null;

        const gradeMap = { 
            '-2': 'PP1', '-1': 'PP2', '1': 'Grade 1', '2': 'Grade 2', '3': 'Grade 3', 
            '4': 'Grade 4', '5': 'Grade 5', '6': 'Grade 6', '7': 'Grade 7', '8': 'Grade 8', '9': 'Grade 9' 
        };

        // DOM Hooks
        const loginSection = document.getElementById('login-section');
        const resultSection = document.getElementById('result-section');
        const loginInput = document.getElementById('login-id');
        const btnLogin = document.getElementById('btn-login');
        const btnBack = document.getElementById('btn-back');
        const btnDownload = document.getElementById('btn-download');
        const studentInfoDiv = document.getElementById('student-info');
        const marksListBody = document.getElementById('marks-list');
        const scoreTypeHeader = document.getElementById('score-type-header');

        // Login Authenticator
        btnLogin.addEventListener('click', async () => {
            const id = loginInput.value.trim().toUpperCase();
            if (!id) return alert("Please enter your Learner ID.");

            btnLogin.disabled = true;
            btnLogin.innerText = "Verifying ID...";

            // Fetch Student Details
            const { data: student, error: studentErr } = await _supabase
                .from('students')
                .select('*')
                .eq('login_id', id)
                .single();

            if (studentErr || !student) {
                alert("Incorrect Login ID. Please check and try again.");
                btnLogin.disabled = false;
                btnLogin.innerText = "🔑 Verify & Enter Portal";
                return;
            }

            // Fetch Marks Data
            const { data: marks, error: marksErr } = await _supabase
                .from('marks_entry')
                .select('*, subject_papers(paper_name)')
                .eq('student_id', student.id);

            currentStudentData = student;
            currentMarksData = marks || [];

            // Determine if Junior School (Grades 7, 8, 9)
            const isJunior = student.grade >= 7;
            scoreTypeHeader.innerText = isJunior ? "Points (Pts)" : "Marks (%)";

            // Render Meta Info UI
            studentInfoDiv.innerHTML = `
                <div class="flex justify-between border-b border-slate-800 pb-1.5 mb-1.5">
                    <span class="text-slate-500">LEARNER</span>
                    <span class="font-extrabold text-amber-400 uppercase">${student.name}</span>
                </div>
                <div class="flex justify-between border-b border-slate-800 pb-1.5 mb-1.5">
                    <span class="text-slate-500">GRADE</span>
                    <span class="font-bold text-white">${gradeMap[student.grade] || 'Grade ' + student.grade}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-500">LOGIN ID</span>
                    <span class="font-bold text-emerald-400 tracking-wider">${student.login_id}</span>
                </div>
            `;

            // Render Marks/Points list UI
            if (currentMarksData.length === 0) {
                marksListBody.innerHTML = `<tr><td colspan="2" class="text-center py-6 text-slate-500 italic">No assessment records found for this cycle.</td></tr>`;
            } else {
                marksListBody.innerHTML = currentMarksData.map(m => `
                    <tr class="hover:bg-slate-800/40">
                        <td class="p-3 text-left text-slate-300 font-medium">${m.subject_papers?.paper_name || 'Subject Component'}</td>
                        <td class="p-3 text-right font-bold text-white">${m.raw_score} ${isJunior ? 'Pts' : '%'}</td>
                    </tr>
                `).join('');
            }

            // Transition UI View
            loginSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
            
            btnLogin.disabled = false;
            btnLogin.innerText = "🔑 Verify & Enter Portal";
        });

        // Exit Portal Action
        btnBack.addEventListener('click', () => {
            currentStudentData = null;
            currentMarksData = null;
            loginInput.value = "";
            resultSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
        });

        // PDF Generator with School Logo & Formatting logic
        btnDownload.addEventListener('click', () => {
            if (!currentStudentData || !currentMarksData) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const isJunior = currentStudentData.grade >= 7;

            // Load and draw school logo
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = logoUrl;

            img.onload = function () {
                // Centered School Logo (Watermark/Header style)
                doc.addImage(img, 'JPEG', 88, 15, 34, 34);

                // Formal School Header
                doc.setFont("helvetica", "bold");
                doc.setFontSize(18);
                doc.setTextColor(15, 23, 42); // slate-900
                doc.text("F.P.F.K BETHANIA ACADEMY", 105, 58, { align: "center" });

                doc.setFont("helvetica", "normal");
                doc.setFontSize(10);
                doc.setTextColor(100, 116, 139); // slate-500
                doc.text("CBA ASSESSMENT WORKSTATION • OFFICIAL RESULT SLIP", 105, 63, { align: "center" });

                // Divider Line
                doc.setDrawColor(245, 158, 11); // amber-500
                doc.setLineWidth(0.8);
                doc.line(20, 68, 190, 68);

                // Student Metadata Block
                doc.setFillColor(248, 250, 252); // slate-50 background block
                doc.rect(20, 74, 170, 26, "F");

                doc.setFont("helvetica", "bold");
                doc.setFontSize(11);
                doc.setTextColor(15, 23, 42);
                doc.text("LEARNER ASSESSMENT CARD", 24, 80);

                doc.setFont("helvetica", "normal");
                doc.setFontSize(10);
                doc.text(`Name: ${currentStudentData.name}`, 24, 88);
                doc.text(`Grade/Class: ${gradeMap[currentStudentData.grade] || 'Grade ' + currentStudentData.grade}`, 24, 94);
                
                doc.setFont("helvetica", "bold");
                doc.text(`Login ID: ${currentStudentData.login_id}`, 140, 88);
                doc.setFont("helvetica", "normal");
                doc.text(`System ID: ${currentStudentData.id.substring(0, 8).toUpperCase()}`, 140, 94);

                // Ledger Table Headers
                doc.setFont("helvetica", "bold");
                doc.setFontSize(10);
                doc.setTextColor(255, 255, 255);
                doc.setFillColor(15, 23, 42); // slate-900
                doc.rect(20, 108, 170, 8, "F");
                doc.text("SUBJECT / COMPONENT AREA", 24, 113.5);
                doc.text(isJunior ? "POINTS ACHIEVED" : "RAW MARKS (%)", 140, 113.5);

                // Populate Records list
                let y = 122;
                let totalScore = 0;
                doc.setFont("helvetica", "normal");
                doc.setTextColor(51, 65, 85); // slate-700

                if (currentMarksData.length === 0) {
                    doc.setFont("helvetica", "italic");
                    doc.text("No academic scores registered to database for this cycle.", 105, y, { align: "center" });
                    y += 10;
                } else {
                    currentMarksData.forEach((m, idx) => {
                        // Alternate gray background rows
                        if (idx % 2 === 1) {
                            doc.setFillColor(248, 250, 252);
                            doc.rect(20, y - 5, 170, 7.5, "F");
                        }

                        const paperName = m.subject_papers?.paper_name || 'Subject Component';
                        const score = m.raw_score;
                        totalScore += score;

                        doc.text(paperName.toUpperCase(), 24, y);
                        doc.setFont("helvetica", "bold");
                        doc.text(`${score} ${isJunior ? 'Pts' : '%'}`, 140, y);
                        doc.setFont("helvetica", "normal");

                        y += 7.5;
                    });
                }

                // Summary Calculation Block
                const numSubjects = currentMarksData.length || 1;
                const averageScore = (totalScore / numSubjects).toFixed(2);
                
                let performanceRate = "";
                if (isJunior) {
                    // Junior school point rating
                    performanceRate = averageScore >= 10 ? "Exceeding Expectation (EE)" : averageScore >= 7 ? "Meeting Expectation (ME)" : "Approaching Expectation (AE)";
                } else {
                    // Standard raw percentage rating
                    performanceRate = averageScore >= 80 ? "Exceeding Expectation (EE)" : averageScore >= 60 ? "Meeting Expectation (ME)" : "Approaching Expectation (AE)";
                }

                y += 5;
                doc.setDrawColor(203, 213, 225); // slate-300
                doc.setLineWidth(0.5);
                doc.line(20, y, 190, y);

                y += 10;
                doc.setFont("helvetica", "bold");
                doc.setFontSize(11);
                doc.setTextColor(15, 23, 42);
                doc.text(`TOTAL SUM: ${totalScore} ${isJunior ? 'Pts' : '%'}`, 24, y);
                doc.text(`AVERAGE GRADE: ${averageScore} ${isJunior ? 'Pts' : '%'}`, 24, y + 7);
                doc.text(`PERFORMANCE RATE: ${performanceRate}`, 24, y + 14);

                // Footer Validation Signature
                doc.setDrawColor(226, 232, 240);
                doc.line(20, 260, 190, 260);

                doc.setFont("helvetica", "italic");
                doc.setFontSize(8);
                doc.setTextColor(148, 163, 184); // slate-400
                doc.text("This assessment record was processed automatically from official CBA database sheets.", 105, 266, { align: "center" });
                doc.text("F.P.F.K Bethania Academy Administration Office.", 105, 271, { align: "center" });

                // Save Document Download
                doc.save(`${currentStudentData.name}_Official_Slip.pdf`);
            };

            img.onerror = function () {
                alert("Unable to fetch school logo asset. Please ensure Supabase Storage is set to Public.");
            };
        });
    </script>
</body>
</html>

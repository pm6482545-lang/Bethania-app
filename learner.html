<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bethania Academy - Learner Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas-pro@1.5.8/dist/html2canvas-pro.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans antialiased">

    <!-- 🔐 STUDENT PORTAL LOGIN WALL -->
    <div id="portal-login-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-100 text-center space-y-5">
            <div class="avatar bg-slate-100 p-2 rounded-full mx-auto ring-4 ring-primary/30">
                <div class="w-16 h-16 rounded-full overflow-hidden flex items-center justify-center">
                    <img src="https://avspdkeozxuxzbmegqwl.supabase.co/storage/v1/object/public/Images/bethania.jpg" alt="Logo" />
                </div>
            </div>
            <div>
                <h2 class="text-xl font-black text-slate-900 tracking-tight uppercase">Learner Access Gate</h2>
                <p class="text-xs text-slate-500 mt-1">Please enter your unique Student Login ID to proceed</p>
            </div>
            <div class="form-control text-left">
                <label class="label-text font-bold text-slate-600 text-[11px] uppercase tracking-wider mb-1">Student Login ID</label>
                <input type="text" id="student-login-id" placeholder="e.g. AB1234" class="input input-bordered focus:outline-none uppercase text-center font-mono tracking-widest font-bold" />
            </div>
            <button id="student-login-btn" class="btn btn-primary w-full text-white font-bold tracking-wide uppercase">
                🔓 Authenticate Portal
            </button>
        </div>
    </div>

    <!-- MAIN PORTAL WRAPPER -->
    <div id="portal-dashboard-wrapper" class="hidden">
        <header class="navbar bg-slate-900 text-white shadow-md px-4 sm:px-8 sticky top-0 z-50 border-b border-primary/20">
            <div class="flex-1">
                <div class="flex items-center gap-3.5">
                    <div class="avatar bg-white p-1 rounded-full ring-2 ring-primary/50">
                        <div class="w-10 h-10 rounded-full overflow-hidden flex items-center justify-center">
                            <img src="https://avspdkeozxuxzbmegqwl.supabase.co/storage/v1/object/public/Images/bethania.jpg" alt="Logo" />
                        </div>
                    </div>
                    <div>
                        <h1 class="text-sm sm:text-base font-extrabold tracking-wider uppercase text-primary text-sky-400" id="student-welcome-title">Learner Portal</h1>
                        <p class="text-[9px] sm:text-[10px] text-slate-400 font-medium tracking-widest uppercase" id="student-subtitle">Bethania Academy Portal</p>
                    </div>
                </div>
            </div>
            <div class="flex-none">
                <button id="portal-logout-btn" class="btn btn-ghost btn-xs sm:btn-sm text-slate-400 hover:text-white uppercase font-bold">Logout</button>
            </div>
        </header>

        <main class="container mx-auto p-4 sm:p-6 max-w-4xl space-y-6">
            <!-- REPORT SEARCH AND FILTER MODULE -->
            <section class="card bg-white shadow-md border border-slate-200/60">
                <div class="card-body p-5">
                    <h2 class="card-title text-base font-bold uppercase tracking-tight text-slate-900 mb-2">🔎 Academic Records Filter</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 bg-slate-50 p-4 rounded-xl border border-slate-200 items-end">
                        <div class="form-control">
                            <label class="label-text font-bold text-[10px] tracking-wider uppercase text-slate-500 mb-1">Academic Year</label>
                            <select id="filter-year" class="select select-bordered select-sm w-full focus:outline-none">
                                <option value="2026" selected>2026</option>
                                <option value="2027">2027</option>
                            </select>
                        </div>
                        <div class="form-control">
                            <label class="label-text font-bold text-[10px] tracking-wider uppercase text-slate-500 mb-1">Target Term</label>
                            <select id="filter-term" class="select select-bordered select-sm w-full focus:outline-none">
                                <option value="Term 1">Term 1</option>
                                <option value="Term 2" selected>Term 2</option>
                                <option value="Term 3">Term 3</option>
                            </select>
                        </div>
                        <div class="form-control">
                            <label class="label-text font-bold text-[10px] tracking-wider uppercase text-slate-500 mb-1">Assessment Cycle</label>
                            <select id="filter-series" class="select select-bordered select-sm w-full focus:outline-none">
                                <option value="Opener Exam">Opener Exam</option>
                                <option value="Mid Term Exam" selected>Mid Term Exam</option>
                                <option value="End Term Exam">End Term Exam</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-actions justify-end mt-4">
                        <button id="fetch-report-btn" class="btn btn-primary btn-sm text-white font-bold px-6 shadow-sm">
                            📊 Compile Report Performance
                        </button>
                    </div>
                </div>
            </section>

            <!-- RESULTS LEDGER SCREEN -->
            <section id="results-display-card" class="card bg-white shadow-md border border-slate-200/60 hidden">
                <div class="card-body p-5 space-y-4">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b pb-3 gap-2">
                        <div>
                            <h2 class="text-base font-black text-slate-950 uppercase tracking-tight" id="display-exam-title">-</h2>
                            <p class="text-xs text-slate-500 font-medium" id="display-learner-meta">-</p>
                        </div>
                        <button id="download-slip-pdf-btn" class="btn btn-success text-white btn-sm font-bold shadow-sm">
                            💾 Download Report Slip (.pdf)
                        </button>
                    </div>

                    <div class="overflow-x-auto rounded-xl border border-slate-200">
                        <table class="table table-sm table-zebra w-full font-medium">
                            <thead class="bg-slate-900 text-white text-[10px] font-bold uppercase tracking-wider">
                                <tr>
                                    <th class="py-2.5">Learning Area / Subject Component</th>
                                    <th class="text-center py-2.5">Raw Score</th>
                                    <th class="text-center py-2.5">CBA Points</th>
                                    <th class="text-center py-2.5">Competency Level</th>
                                </tr>
                            </thead>
                            <tbody id="results-table-rows" class="text-xs font-mono">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 pt-2" id="summary-metrics-panels">
                        <!-- Summary metrics metrics populated dynamically -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- INVISIBLY RENDERED AREA FOR CANVAS PRINT CONTEXTS -->
    <div style="position: absolute; left: -9999px; top: -9999px;">
        <div id="pdf-compilation-sandbox" style="width: 800px; p: 40px; font-family: 'Times New Roman', Times, serif; background: #ffffff; color: #000000; position: relative;">
            <!-- Render Target Structure for html2canvas -->
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://avspdkeozxuxzbmegqwl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_K9s_MVcCe1wtUNUO1YgRbA_QtoBZYRR";
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginOverlay = document.getElementById('portal-login-overlay');
        const dashboardWrapper = document.getElementById('portal-dashboard-wrapper');
        const loginIdInput = document.getElementById('student-login-id');
        const loginBtn = document.getElementById('student-login-btn');
        const logoutBtn = document.getElementById('portal-logout-btn');

        const filterYear = document.getElementById('filter-year');
        const filterTerm = document.getElementById('filter-term');
        const filterSeries = document.getElementById('filter-series');
        const fetchReportBtn = document.getElementById('fetch-report-btn');

        const resultsDisplayCard = document.getElementById('results-display-card');
        const displayExamTitle = document.getElementById('display-exam-title');
        const displayLearnerMeta = document.getElementById('display-learner-meta');
        const resultsTableRows = document.getElementById('results-table-rows');
        const summaryMetricsPanels = document.getElementById('summary-metrics-panels');
        const downloadSlipPdfBtn = document.getElementById('download-slip-pdf-btn');
        const sandbox = document.getElementById('pdf-compilation-sandbox');

        let currentLearner = null;
        let dbSchemaCache = { examColumn: 'test_name', scoreColumn: 'raw_score' };

        const CBC_SUBJECT_TIERS = {
            lower_primary: [
                "Language Activities", "Mathematical Activities", "Environmental Activities",
                "Psychomotor Activities", "Religious Education Activities",
                "Indigenous Language Activities", "Kiswahili Language Activities"
            ],
            upper_primary: [
                "English", "Kiswahili", "Mathematics", "Science and Technology",
                "Agriculture and Nutrition", "Creative Arts", "Social Studies", 
                "Christian Religious Education (C.R.E)", "Islamic Religious Education (I.R.E)", "Hindu Religious Education (H.R.E)"
            ],
            junior_school: [
                "English", "Kiswahili", "Mathematics", "Integrated Science",
                "Pre-Technical Studies", "Social Studies", "Agriculture and Nutrition",
                "Creative Arts and Sports", "Christian Religious Education (C.R.E)", 
                "Islamic Religious Education (I.R.E)", "Hindu Religious Education (H.R.E)"
            ]
        };

        function getGradeTier(grade) {
            const g = parseInt(grade);
            if (g <= 3) return "lower_primary";
            if (g >= 4 && g <= 6) return "upper_primary";
            if (g >= 7 && g <= 9) return "junior_school";
            return "upper_primary";
        }

        function getGradeLabel(grade) {
            const val = parseInt(grade);
            if (val === -2) return "PP1";
            if (val === -1) return "PP2";
            return `Grade ${val}`;
        }

        function convertScoreToPoints(score, max) {
            const pct = (score / max) * 100;
            if (pct >= 90) return 8;
            if (pct >= 75) return 7;
            if (pct >= 58) return 6;
            if (pct >= 40) return 5;
            if (pct >= 30) return 4;
            if (pct >= 20) return 3;
            if (pct >= 10) return 2;
            return 1;
        }

        function getPointsRating(avg) {
            if (avg >= 7.5 && avg <= 8.0) return "EE1";
            if (avg >= 6.5 && avg < 7.5) return "EE2";
            if (avg >= 5.5 && avg < 6.5) return "ME1";
            if (avg >= 4.5 && avg < 5.5) return "ME2";
            if (avg >= 3.5 && avg < 4.5) return "AE1";
            if (avg >= 2.5 && avg < 3.5) return "AE2";
            if (avg >= 1.5 && avg < 2.5) return "BE1";
            if (avg >= 1.0 && avg < 1.5) return "BE2";
            return "BE2";
        }

        function getMarksRating(pct) {
            if (pct >= 80) return "EE2";
            if (pct >= 50) return "ME1";
            if (pct >= 40) return "ME2";
            if (pct >= 30) return "AE1";
            if (pct >= 20) return "AE2";
            if (pct >= 10) return "BE1";
            return "BE2";
        }

        async function detectMarksSchema() {
            try {
                const { data } = await _supabase.from('marks_entry').select('*').limit(1);
                if (data && data.length > 0) {
                    const row = data[0];
                    if ('exam_name' in row) dbSchemaCache.examColumn = 'exam_name';
                    else if ('exam_session' in row) dbSchemaCache.examColumn = 'exam_session';
                    else dbSchemaCache.examColumn = 'test_name';

                    if ('score' in row) dbSchemaCache.scoreColumn = 'score';
                    else if ('marks' in row) dbSchemaCache.scoreColumn = 'marks';
                    else dbSchemaCache.scoreColumn = 'raw_score';
                }
            } catch (err) {
                console.warn("Schema sniff warning", err);
            }
        }

        // AUTO SYNC ACTIVE SESSION PREFERENCE
        async function loadActiveExamSessionContext() {
            try {
                const { data } = await _supabase.from('exam_sessions')
                    .select('*')
                    .eq('is_active', true)
                    .order('created_at', { ascending: false })
                    .limit(1);
                
                if (data && data.length > 0) {
                    const tokens = data[0].exam_name.split(' ');
                    if (tokens.length >= 3) {
                        filterYear.value = tokens[0];
                        filterTerm.value = tokens[1] + " " + tokens[2];
                        filterSeries.value = tokens.slice(3).join(' ') || tokens[2];
                    }
                }
            } catch(e) {
                console.warn("Could not synchronize live active context parameters", e);
            }
        }

        loginBtn.addEventListener('click', async () => {
            const uid = loginIdInput.value.trim().toUpperCase();
            if (!uid) return alert("Please present a valid Student Login ID!");

            loginBtn.disabled = true;
            loginBtn.innerText = "Verifying Credentials...";

            try {
                const { data, error } = await _supabase.from('students')
                    .select('*')
                    .eq('login_id', uid)
                    .limit(1);

                if (error) throw error;
                if (!data || data.length === 0) {
                    alert("Authentication Error: Student ID not found.");
                    return;
                }

                currentLearner = data[0];
                document.getElementById('student-welcome-title').innerText = currentLearner.name;
                document.getElementById('student-subtitle').innerText = `${getGradeLabel(currentLearner.grade)} | Stream: ${currentLearner.stream}`;

                loginOverlay.classList.add('hidden');
                dashboardWrapper.classList.remove('hidden');

                await detectMarksSchema();
                await loadActiveExamSessionContext();
                fetchReportBtn.click();
            } catch (err) {
                alert("Database Connectivity Failure: " + err.message);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerText = "🔓 Authenticate Portal";
            }
        });

        logoutBtn.addEventListener('click', () => {
            currentLearner = null;
            resultsDisplayCard.classList.add('hidden');
            loginIdInput.value = "";
            dashboardWrapper.classList.add('hidden');
            loginOverlay.classList.remove('hidden');
        });

        fetchReportBtn.addEventListener('click', async () => {
            if (!currentLearner) return;

            const examContextName = `${filterYear.value} ${filterTerm.value} ${filterSeries.value}`;
            fetchReportBtn.disabled = true;
            fetchReportBtn.innerText = "Compiling Report Profile...";
            resultsDisplayCard.classList.add('hidden');

            try {
                // 1. FINANCIAL RESTRICTION OVERRIDE SAFETY AUDIT Check
                const { data: lockoutCheck, error: lockErr } = await _supabase.from('fee_lockouts')
                    .select('*')
                    .eq('student_id', currentLearner.id)
                    .eq('exam_context', examContextName)
                    .eq('restricted', true)
                    .limit(1);

                if (lockErr) throw lockErr;
                if (lockoutCheck && lockoutCheck.length > 0) {
                    alert(`⚠️ Access Denied: Download privileges for "${examContextName}" are locked due to unresolved school fee balances. Please visit the accounts office.`);
                    return;
                }

                // 2. FETCH EVALUATION RECORDS FROM THE DATABASE ARCHITECTURE
                const tier = getGradeTier(currentLearner.grade);
                const allowed = CBC_SUBJECT_TIERS[tier];

                const { data: dbSubjects, error: subErr } = await _supabase.from('subjects').select('*');
                if (subErr) throw subErr;

                const filteredSubjects = (dbSubjects || []).filter(s => allowed.includes(s.subject_name.trim()));
                const subjectIds = filteredSubjects.map(s => s.id);

                const { data: marks, error: marksErr } = await _supabase.from('marks_entry')
                    .select('*')
                    .eq(dbSchemaCache.examColumn, examContextName)
                    .eq('student_id', currentLearner.id)
                    .in('subject_id', subjectIds)
                    .is('paper_id', null);

                if (marksErr) throw marksErr;
                const reportsLedger = marks || [];

                if (reportsLedger.length === 0) {
                    alert(`No recorded performance entries were found matching the constraint cycle: "${examContextName}"`);
                    return;
                }

                displayExamTitle.innerText = examContextName;
                displayLearnerMeta.innerText = `Official Performance Summary Sheet for ${currentLearner.name} (${getGradeLabel(currentLearner.grade)} ${currentLearner.stream})`;

                let aggregateScoreSum = 0;
                let registeredMetricsCount = 0;
                let rowsHtml = "";

                filteredSubjects.forEach(sub => {
                    const record = reportsLedger.find(m => m.subject_id === sub.id);
                    if (record) {
                        const score = parseFloat(record[dbSchemaCache.scoreColumn]);
                        const points = convertScoreToPoints(score, 100);
                        const competency = tier === "lower_primary" ? getMarksRating(score) : getPointsRating(points);

                        aggregateScoreSum += (tier === "lower_primary" ? score : points);
                        registeredMetricsCount++;

                        rowsHtml += `
                            <tr>
                                <td class="font-bold text-slate-900 py-2.5">${sub.subject_name}</td>
                                <td class="text-center font-bold text-slate-700">${score}%</td>
                                <td class="text-center font-bold text-emerald-700">${tier === "lower_primary" ? "-" : points}</td>
                                <td class="text-center"><span class="badge badge-sm font-bold">${competency}</span></td>
                            </tr>
                        `;
                    } else {
                        rowsHtml += `
                            <tr class="opacity-40">
                                <td class="font-bold text-slate-400 py-2.5">${sub.subject_name}</td>
                                <td class="text-center font-mono">-</td>
                                <td class="text-center font-mono">-</td>
                                <td class="text-center font-mono">Missing</td>
                            </tr>
                        `;
                    }
                });

                resultsTableRows.innerHTML = rowsHtml;

                const totalMeanAverage = registeredMetricsCount > 0 ? (aggregateScoreSum / registeredMetricsCount) : 0;
                const compositeRatingLabel = tier === "lower_primary" ? getMarksRating(totalMeanAverage) : getPointsRating(totalMeanAverage);

                summaryMetricsPanels.innerHTML = `
                    <div class="bg-slate-50 border p-3 rounded-xl text-center">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Sum Total Metrics</span>
                        <strong class="text-lg font-black text-slate-800">${aggregateScoreSum.toFixed(0)}</strong>
                    </div>
                    <div class="bg-slate-50 border p-3 rounded-xl text-center">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Mean Score Average</span>
                        <strong class="text-lg font-black text-sky-700">${totalMeanAverage.toFixed(1)}${tier === "lower_primary" ? "%" : " Pts"}</strong>
                    </div>
                    <div class="bg-slate-50 border p-3 rounded-xl text-center">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Final Performance Rating</span>
                        <strong class="text-lg font-black text-emerald-700">${compositeRatingLabel}</strong>
                    </div>
                `;

                resultsDisplayCard.classList.remove('hidden');

                // 3. PRE-BUILD PRINTS AND EMBEDDED GRAPHICS CANVAS IN THE BACKGROUND STRUCTURE
                buildSandboxPdfLayout(examContextName, filteredSubjects, reportsLedger, tier, aggregateScoreSum, totalMeanAverage, compositeRatingLabel);

            } catch (err) {
                alert("Report Generation Interrupted: " + err.message);
            } finally {
                fetchReportBtn.disabled = false;
                fetchReportBtn.innerText = "📊 Compile Report Performance";
            }
        });

        function buildSandboxPdfLayout(examName, subjectsList, marksList, tier, totalSum, averageMean, finalRating) {
            sandbox.innerHTML = `
                <div style="padding: 30px; border: 3px double #000; position: relative; background: #fff;">
                    <!-- Diagonal Background Watermark -->
                    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 75px; font-weight: 900; color: rgba(0,0,0,0.03); pointer-events: none; white-space: nowrap; font-family: sans-serif; tracking-widest: 3px;">BETHANIA ACADEMY</div>
                    
                    <!-- Official Institutional Letterhead Header Layout -->
                    <div style="display: flex; align-items: center; border-bottom: 3px solid #000; padding-bottom: 12px; margin-bottom: 15px;">
                        <img src="https://avspdkeozxuxzbmegqwl.supabase.co/storage/v1/object/public/Images/bethania.jpg" style="width: 70px; height: 70px; border-radius: 50%; margin-right: 15px;" />
                        <div style="flex: 1; text-align: center;">
                            <h1 style="font-size: 24px; font-weight: bold; margin: 0; uppercase tracking-wide">F.P.F.K BETHANIA ACADEMY</h1>
                            <p style="font-size: 10px; font-style: italic; margin: 2px 0; font-weight: bold;">Determination is Nobility &bull; Competency Based Curriculum Report Ledger</p>
                            <p style="font-size: 9px; margin: 1px 0; font-family: monospace;">Email: info@bethaniaacademy.ac.ke | Tel: +254 700 000000</p>
                        </div>
                        <div style="width: 70px;"></div>
                    </div>

                    <div style="text-align: center; margin-bottom: 15px;">
                        <h2 style="font-size: 14px; font-weight: bold; text-decoration: underline; margin: 0; text-transform: uppercase;">OFFICIAL STUDENT ASSESSMENT SLIP</h2>
                    </div>

                    <!-- Personal Information Matrix Coordinates -->
                    <table style="width: 100%; font-size: 11px; margin-bottom: 15px; border-collapse: collapse;">
                        <tr>
                            <td style="padding: 4px; width: 15%; font-weight: bold;">LEARNER NAME:</td>
                            <td style="padding: 4px; width: 45%; border-bottom: 1px dashed #000; font-weight: bold; text-transform: uppercase;">${currentLearner.name}</td>
                            <td style="padding: 4px; width: 12%; font-weight: bold; text-align: right;">STUDENT ID:</td>
                            <td style="padding: 4px; width: 28%; border-bottom: 1px dashed #000; font-family: monospace; font-weight: bold;">${currentLearner.login_id}</td>
                        </tr>
                        <tr>
                            <td style="padding: 4px; font-weight: bold;">CLASS HIERARCHY:</td>
                            <td style="padding: 4px; border-bottom: 1px dashed #000;">${getGradeLabel(currentLearner.grade)} (${currentLearner.stream})</td>
                            <td style="padding: 4px; font-weight: bold; text-align: right;">EVALUATION:</td>
                            <td style="padding: 4px; border-bottom: 1px dashed #000; font-weight: bold; text-transform: uppercase;">${examName}</td>
                        </tr>
                    </table>

                    <!-- Structural Data Sheets Component Grid Layout -->
                    <table style="width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px;">
                        <thead>
                            <tr style="background-color: #f1f5f9;">
                                <th style="border: 1.5px solid #000; padding: 7px; text-align: left;">LEARNING AREA / SUBJECT COMPONENT</th>
                                <th style="border: 1.5px solid #000; padding: 7px; text-align: center; width: 100px;">RAW SCORE</th>
                                <th style="border: 1.5px solid #000; padding: 7px; text-align: center; width: 100px;">CBA POINTS</th>
                                <th style="border: 1.5px solid #000; padding: 7px; text-align: center; width: 160px;">COMPETENCY LEVEL</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${subjectsList.map(sub => {
                                const m = marksList.find(md => md.subject_id === sub.id);
                                const scoreText = m ? `${parseFloat(m[dbSchemaCache.scoreColumn])}%` : "-";
                                const pointsText = m ? (tier === "lower_primary" ? "-" : convertScoreToPoints(parseFloat(m[dbSchemaCache.scoreColumn]), 100)) : "-";
                                const rateText = m ? (tier === "lower_primary" ? getMarksRating(parseFloat(m[dbSchemaCache.scoreColumn])) : getPointsRating(convertScoreToPoints(parseFloat(m[dbSchemaCache.scoreColumn]), 100))) : "Missing";
                                return `
                                    <tr>
                                        <td style="border: 1px solid #000; padding: 6px; font-weight: bold;">${sub.subject_name}</td>
                                        <td style="border: 1px solid #000; padding: 6px; text-align: center; font-family: monospace;">${scoreText}</td>
                                        <td style="border: 1px solid #000; padding: 6px; text-align: center; font-family: monospace;">${pointsText}</td>
                                        <td style="border: 1px solid #000; padding: 6px; text-align: center; font-weight: bold;">${rateText}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>

                    <!-- Metrics Summary Blocks Row Coordinates -->
                    <div style="display: flex; justify-content: space-between; margin-bottom: 30px; gap: 10px;">
                        <div style="border: 1.5px solid #000; padding: 8px; flex: 1; text-align: center; background: #fafafa;">
                            <span style="font-size: 9px; font-weight: bold; color: #555; text-transform: uppercase; block">AGGREGATE POINTS SUM</span>
                            <div style="font-size: 16px; font-weight: bold; margin-top: 3px;">${totalSum.toFixed(0)}</div>
                        </div>
                        <div style="border: 1.5px solid #000; padding: 8px; flex: 1; text-align: center; background: #fafafa;">
                            <span style="font-size: 9px; font-weight: bold; color: #555; text-transform: uppercase; block">MEAN COMPLIANCE RATING</span>
                            <div style="font-size: 16px; font-weight: bold; margin-top: 3px; color: #0284c7;">${averageMean.toFixed(1)}${tier === "lower_primary" ? "%" : " Pts"}</div>
                        </div>
                        <div style="border: 1.5px solid #000; padding: 8px; flex: 1; text-align: center; background: #fafafa;">
                            <span style="font-size: 9px; font-weight: bold; color: #555; text-transform: uppercase; block">OVERALL ASSESSMENT BAND</span>
                            <div style="font-size: 16px; font-weight: bold; margin-top: 3px; color: #16a34a;">${finalRating}</div>
                        </div>
                    </div>

                    <!-- Authorization and Verification Seals -->
                    <div style="display: flex; justify-content: space-between; font-size: 10px; margin-top: 40px; padding-top: 15px;">
                        <div style="text-align: center; width: 220px;">
                            <div style="border-bottom: 1px solid #000; height: 20px;"></div>
                            <p style="margin-top: 5px; font-weight: bold; uppercase">Class Teacher Signature</p>
                        </div>
                        <div style="text-align: center; width: 220px;">
                            <div style="border-bottom: 1px solid #000; height: 20px; font-family: 'Courier New', monospace; font-weight: bold; font-size: 9px; line-height: 25px;">VERIFIED SYSTEM SECURITY</div>
                            <p style="margin-top: 5px; font-weight: bold; uppercase">Bethania Portal Registry Seal</p>
                        </div>
                    </div>
                </div>
            `;
        }

        downloadSlipPdfBtn.addEventListener('click', async () => {
            downloadSlipPdfBtn.disabled = true;
            downloadSlipPdfBtn.innerText = "Generating File Engine...";

            try {
                const opt = {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    backgroundColor: '#ffffff'
                };

                const canvas = await html2canvasPro(sandbox, opt);
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'pt',
                    format: 'a4'
                });

                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();
                
                // Keep structural aspect ratio matching A4 bounds perfectly
                const srcWidth = canvas.width;
                const srcHeight = canvas.height;
                const ratio = Math.min(pdfWidth / srcWidth, pdfHeight / srcHeight);
                
                const finalW = srcWidth * ratio;
                const finalH = srcHeight * ratio;
                const xPos = (pdfWidth - finalW) / 2;
                const yPos = 25; 

                pdf.addImage(imgData, 'JPEG', xPos, yPos, finalW, finalH, undefined, 'FAST');
                
                const fileIdentifierName = `${currentLearner.name.replace(/\s+/g, '_')}_${filterSeries.value.replace(/\s+/g, '_')}_Report.pdf`;
                pdf.save(fileIdentifierName);
            } catch (err) {
                alert("PDF Engine Compilation Failure: " + err.message);
            } finally {
                downloadSlipPdfBtn.disabled = false;
                downloadSlipPdfBtn.innerText = "💾 Download Report Slip (.pdf)";
            }
        });
    </script>
</body>
</html>
